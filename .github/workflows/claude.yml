name: Claude Code

on:
  workflow_call:
    inputs:
      model:
        description: "Bedrock model ID"
        type: string
        default: "eu.anthropic.claude-sonnet-4-6"
      aws_region:
        description: "AWS region for Bedrock OIDC"
        type: string
        default: "eu-central-1"
      prompt:
        description: "Optional prompt to pass to claude-code-action (e.g. /review). When empty, the action handles @claude mentions automatically."
        type: string
        default: ""
      max_turns:
        description: "Maximum number of agentic turns"
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_ROLE_ARN:
        required: true
      GEMMA_CLAUDE_ASSISTANT_APP_ID:
        required: true
      GEMMA_CLAUDE_ASSISTANT_APP_PRIVATE_KEY:
        required: true

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GEMMA_CLAUDE_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.GEMMA_CLAUDE_ASSISTANT_APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CLAUDE_CODE_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Acknowledge trigger
        if: github.event.comment.id
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          use_bedrock: "true"
          allowed_bots: "gemma-claude-assistant[bot],gemmbot"
          prompt: ${{ inputs.prompt || '' }}
          claude_args: >-
            --model ${{ inputs.model }}
            ${{ inputs.max_turns && format('--max-turns {0}', inputs.max_turns) || '' }}

      - name: Post session cost
        if: always() && steps.claude.outputs.execution_file
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const file = '${{ steps.claude.outputs.execution_file }}';
            if (!fs.existsSync(file)) return;

            const messages = JSON.parse(fs.readFileSync(file, 'utf8'));
            const result = Array.isArray(messages)
              ? messages.find(m => m.type === 'result')
              : messages;
            if (!result) return;

            const cost = result.total_cost_usd ?? 0;
            const turns = result.num_turns ?? 0;
            const duration = result.duration_ms ? Math.round(result.duration_ms / 1000) : 0;
            const model = '${{ inputs.model }}';

            const body = `**Claude session cost:** \$${cost.toFixed(4)} · ${turns} turns · ${duration}s · \`${model}\``;

            const issue_number = context.issue?.number ?? context.payload.pull_request?.number;
            if (issue_number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }
