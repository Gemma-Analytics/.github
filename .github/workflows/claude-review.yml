name: Claude Code Review

on:
  workflow_call:
    inputs:
      model:
        description: "Bedrock model ID"
        type: string
        default: "eu.anthropic.claude-sonnet-4-6"
      aws_region:
        description: "AWS region for Bedrock OIDC"
        type: string
        default: "eu-central-1"
      additional_instructions:
        description: "Extra repo-specific review instructions appended to the base prompt"
        type: string
        default: ""
      max_turns:
        description: "Maximum number of agentic turns"
        type: string
        default: "15"
    secrets:
      CLAUDE_CODE_ROLE_ARN:
        required: true
      GEMMA_CLAUDE_ASSISTANT_APP_ID:
        required: true
      GEMMA_CLAUDE_ASSISTANT_APP_PRIVATE_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GEMMA_CLAUDE_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.GEMMA_CLAUDE_ASSISTANT_APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CLAUDE_CODE_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Build review prompt
        id: prompt
        run: |
          cat > /tmp/review_prompt.txt << 'BASEPROMPT'
          You are a code reviewer. Be efficient — minimize tool calls.
          IMPORTANT: Only review the PR diff. Do NOT explore the broader codebase, read unrelated files, run tests, or take any actions beyond what is listed below.

          Follow these steps in order:

          1. Run `cat CLAUDE.md` to read repo conventions (skip if it doesn't exist).
          2. Run `gh pr diff` to get the full diff. This is your sole input — review ONLY the lines changed in this PR.
          3. Only if a changed line is ambiguous without context, read that specific file. Do not read files that are not in the diff.
          4. Review the diff for: correctness/bugs, security concerns, performance issues, style violations (per CLAUDE.md), and missing test coverage.
          5. Post your findings:
             a. For each issue, use `mcp__github_inline_comment__create_inline_comment` to comment on the specific diff line.
                Prefix each comment with [BLOCKING], [Style], or [Suggestion].
             b. After all inline comments, write a short summary (5-10 lines max) to /tmp/summary.md, then run `gh pr comment --body-file /tmp/summary.md`.
             c. If the PR is clean, post only a brief approving summary (no inline comments needed).
          6. Stop immediately.

          Quality guidelines:
          - Do NOT invent problems. Only flag real issues visible in the diff.
          - Limit to at most 8 inline comments. Focus on the most impactful issues.
          - Do not suggest stylistic changes unless they violate explicit CLAUDE.md rules.
          BASEPROMPT

          ADDITIONAL="${{ inputs.additional_instructions }}"
          if [ -n "$ADDITIONAL" ]; then
            printf '\nAdditionally, check for:\n%s\n' "$ADDITIONAL" >> /tmp/review_prompt.txt
          fi

          {
            echo 'value<<PROMPT_EOF'
            cat /tmp/review_prompt.txt
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          use_bedrock: "true"
          allowed_bots: "gemma-claude-assistant[bot]"
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: >-
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "Bash(git *),Bash(grep *),Bash(find *),Bash(gh *),Bash(cat *),mcp__github_inline_comment__create_inline_comment"

      - name: Post session cost
        if: always() && steps.claude.outputs.execution_file
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const file = '${{ steps.claude.outputs.execution_file }}';
            if (!fs.existsSync(file)) return;

            const messages = JSON.parse(fs.readFileSync(file, 'utf8'));
            const result = Array.isArray(messages)
              ? messages.find(m => m.type === 'result')
              : messages;
            if (!result) return;

            const cost = result.total_cost_usd ?? 0;
            const turns = result.num_turns ?? 0;
            const duration = result.duration_ms ? Math.round(result.duration_ms / 1000) : 0;
            const model = '${{ inputs.model }}';

            const body = `**Claude review cost:** \$${cost.toFixed(4)} · ${turns} turns · ${duration}s · \`${model}\``;

            const issue_number = context.issue?.number ?? context.payload.pull_request?.number;
            if (issue_number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }
