name: Claude Code Review

on:
  workflow_call:
    inputs:
      model:
        description: "Bedrock model ID"
        type: string
        default: "eu.anthropic.claude-sonnet-4-6"
      aws_region:
        description: "AWS region for Bedrock OIDC"
        type: string
        default: "eu-central-1"
      additional_instructions:
        description: "Extra repo-specific review instructions appended to the base prompt"
        type: string
        default: ""
      max_turns:
        description: "Maximum number of agentic turns"
        type: string
        default: "50"
    secrets:
      CLAUDE_CODE_ROLE_ARN:
        required: true
      GEMMA_CLAUDE_ASSISTANT_APP_ID:
        required: true
      GEMMA_CLAUDE_ASSISTANT_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: claude-review-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GEMMA_CLAUDE_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.GEMMA_CLAUDE_ASSISTANT_APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CLAUDE_CODE_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Acknowledge trigger
        if: github.event.comment.id
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Build review prompt
        id: prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ADDITIONAL: ${{ inputs.additional_instructions }}
        run: |
          cat > /tmp/review_prompt.txt << 'BASEPROMPT'
          You are a code reviewer performing a ONE-SHOT review of PR #PR_NUMBER_PLACEHOLDER.

          IMPORTANT — one-shot context: this review only runs on PR open, draft→ready,
          or explicit `@claude review` comment. New commits do NOT retrigger it. List
          every blocking issue now, including second-order consequences of likely fixes.
          If the author has to open another round, the review failed.

          Step 1 — Read conventions
            - `cat CLAUDE.md` (skip if missing). These rules are authoritative for [Style].
            - `gh pr diff PR_NUMBER_PLACEHOLDER` to get the full diff. Always use this
              PR number in every `gh` call.

          Step 2 — Bounded exploration (allowed, not required)
            You MAY read up to 5 files outside the diff, but only for flow-dependent
            analysis: tracing inputs into SQL/shell/template builders, checking
            auth-token lifetime and refresh, confirming error-handling flow, verifying
            dependency/lockfile consistency, or inspecting imports of new modules.
            Do NOT read unrelated files, run tests, or browse the codebase.

          Step 3 — Category sweep (traverse EVERY category; output per-category
          findings or the literal word "none" — a silent skip is a bug)

            1. Correctness — bugs, wrong defaults, type/None handling, off-by-one
            2. Security — secrets or real credentials committed (examine every
               toml/json/env-like file); injection (SQL, shell, template, path);
               auth token handling; PII in logs
            3. Reliability — error handling, retries (beware retry-on-generator
               duplication for replace/full-refresh resources), timeouts, resource
               leaks (file handles, tempdirs, connections), concurrency/races
            4. Data integrity — schema contracts, idempotency, incremental cursor
               correctness, write disposition semantics
            5. Performance — N+1 work, unbounded memory, blocking I/O in hot paths
            6. Dependencies — lockfile sync with pyproject.toml/package.json,
               dev-vs-prod placement, required tools declared in CLAUDE.md present
            7. Tests — missing coverage for new logic-bearing code
            8. Docs — accuracy vs behavior (README claims that code doesn't deliver)
            9. Style — only when it violates an explicit CLAUDE.md rule

          Step 4 — Completeness self-check
            Before posting anything, re-scan the diff once against the 9 categories.
            If a category surfaces new findings, add them.

          Step 5 — Post findings
            a. Inline comments via mcp__github_inline_comment__create_inline_comment.
               Prefix every comment with [BLOCKING], [Style], or [Suggestion].
               - Post ALL blockers inline — no cap.
               - Cap [Suggestion] inline comments at 8 (pick the most impactful).
               - Never drop a blocker silently; if the diff is enormous, post the
                 remainder as a grouped list in the summary.
            b. Summary comment via Write → /tmp/summary.md → `gh pr comment PR_NUMBER_PLACEHOLDER --body-file /tmp/summary.md`.
               Use this EXACT template (omit section only if literally nothing to
               say; never skip the Blocking header):

                  ## Blocking
                  <bullet list or "none">
                  ## Correctness
                  ## Security
                  ## Reliability
                  ## Data integrity
                  ## Performance
                  ## Dependencies
                  ## Tests
                  ## Docs
                  ## Style
                  ## Suggestions

               Every blocker already posted inline must also be enumerated here so
               the author has one complete list to work from.
            c. If truly clean: a brief approving summary with "## Blocking: none",
               no inline comments.

          Step 6 — Stop.

          Quality rules
            - Do NOT invent problems. Only flag real issues you can point to in the diff.
            - Do NOT suggest stylistic changes unless CLAUDE.md mandates them.
            - Prefer specific line references over generalities.
          BASEPROMPT

          sed -i "s/PR_NUMBER_PLACEHOLDER/$PR_NUMBER/g" /tmp/review_prompt.txt

          if [ -n "$ADDITIONAL" ]; then
            printf '\nRepo-specific checks (apply in addition to the base categories above):\n%s\n' "$ADDITIONAL" >> /tmp/review_prompt.txt
          fi

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            EXTRA=$(printf '%s' "$COMMENT_BODY" | sed -E 's/^[[:space:]]*@claude review[[:space:]]*//')
            if [ -n "$EXTRA" ] && [ "$EXTRA" != "$COMMENT_BODY" ]; then
              printf '\nUser-requested focus for this review:\n%s\n' "$EXTRA" >> /tmp/review_prompt.txt
            fi
          fi

          {
            echo 'value<<PROMPT_EOF'
            cat /tmp/review_prompt.txt
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          use_bedrock: "true"
          allowed_bots: "gemma-claude-assistant[bot],gemmbot"
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: >-
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "Bash(git *),Bash(grep *),Bash(find *),Bash(gh *),Bash(cat *),Write,mcp__github_inline_comment__create_inline_comment"

      - name: Post session cost
        if: always() && steps.claude.outputs.execution_file
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const file = '${{ steps.claude.outputs.execution_file }}';
            if (!fs.existsSync(file)) return;

            const messages = JSON.parse(fs.readFileSync(file, 'utf8'));
            const result = Array.isArray(messages)
              ? messages.find(m => m.type === 'result')
              : messages;
            if (!result) return;

            const cost = result.total_cost_usd ?? 0;
            const turns = result.num_turns ?? 0;
            const duration = result.duration_ms ? Math.round(result.duration_ms / 1000) : 0;
            const model = '${{ inputs.model }}';

            const body = `**Claude review cost:** \$${cost.toFixed(4)} · ${turns} turns · ${duration}s · \`${model}\``;

            const issue_number = context.issue?.number ?? context.payload.pull_request?.number;
            if (issue_number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }
